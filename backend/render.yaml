services:
  - type: web
    name: kriptograf-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 2
      --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://kriptograf.pages.dev
