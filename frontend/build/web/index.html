<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js" defer></script>
  <meta name="theme-color" content="#0A0B14">
  <title>KriptoGraf Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0A0B14; }
    #loading { position: fixed; inset: 0; background: #0A0B14;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; }
    .logo { font-family: system-ui; font-size: 24px; font-weight: 800;
      color: white; letter-spacing: 1px; margin-bottom: 32px; }
    .logo span { color: #6C63FF; }
    .spinner { width: 32px; height: 32px; border: 2px solid #1e2035;
      border-top-color: #6C63FF; border-radius: 50%;
      animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">KRIPTO<span>GRAF</span></div>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
