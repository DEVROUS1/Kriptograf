<!DOCTYPE html>
<html lang="tr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KriptoGraf PRO: Gerçek zamanlı kripto paralar, yapay zeka duygu analizi, Order Book ve SMC trade haritaları ile donatılmış yeni nesil profesyonel terminal.">
  <meta name="keywords" content="kripto, terminal, yapay zeka, bitcoin, analiz, trade">
  <meta property="og:title" content="KriptoGraf PRO - Kripto Analiz Terminali">
  <meta property="og:description" content="KriptoGraf PRO ile piyasaları gerçek zamanlı analiz edin, yapay zeka sinyalleri ile trade yapın.">
  <meta property="og:type" content="website">
  <link rel="manifest" href="manifest.json">
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js" defer></script>
  <meta name="theme-color" content="#07080E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KriptoGraf">
  <title>KriptoGraf Pro - Gelişmiş Kripto Terminali</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #07080E; }
    #loading { position: fixed; inset: 0; background: #07080E;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; }
    .logo { font-family: system-ui; font-size: 24px; font-weight: 800;
      color: white; letter-spacing: 1px; margin-bottom: 32px; }
    .logo span { color: #5E54FF; }
    .spinner { width: 32px; height: 32px; border: 2px solid #11121C;
      border-top-color: #5E54FF; border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">KRIPTO<span>GRAF</span></div>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
